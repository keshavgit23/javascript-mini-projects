<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="counter">Counter</h1>
        <span class="spn-element">
            <button class="btn-controls decre">Decrement</button>
            <button class="btn-controls reset">Reset</button>
            <button class="btn-controls incre">Increment</button>
        </span>

        <p class="clicks updateInc">Clicks On Increment: </p>
        <p class="clicks updateDec">Clicks On Decrement: </p>
    </div>
    <script src="script.js"></script>
</body>

</html>
