<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="nav">Palindrome Checker</div>
    <div class="main">
        <div class="side-bar">
            <div class="history">
                <ul>
                    <li><span class="heading">Recent history</span>
                        <button id="toggle-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                                fill="#1f1f1f">
                                <path
                                    d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm540-453h100v-107H700v107Zm0 186h100v-106H700v106ZM160-240h460v-480H160v480Zm540 0h100v-107H700v107Z" />
                            </svg>
                        </button>
                    </li>
                </ul>
                <div class="inputs">

            </div>
                <!-- here new div element will append after saving to db -->

        </div>
            <button class="clear">Clear History</button>
            <div class="clear-result"></div>
        </div>
        <div class="container">
            <div class="label">Enter a Phrase or Number</div>
            <input class="input" id="input" type="text" placeholder="Enter here" required>
            <button class="btn">Check</button>
            <div class="showResult"></div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
