<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Number Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="title">Prime Number Checker</div>

            <input class="input" type="number" id="number" placeholder="Enter a number" required>
            <button id="btn" class="check-btn">Check</button>
        </div>
        <div id="resultDiv"></div>
    </div>
    <script src="primeChecker.js"></script>
</body>

</html>
